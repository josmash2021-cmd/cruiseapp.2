version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cruise
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cruise_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cruise:${DB_PASSWORD}@db:5432/cruise_db

volumes:
  pgdata:
