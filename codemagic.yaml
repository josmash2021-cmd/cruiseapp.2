workflows:
  ios-sideload:
    name: iOS IPA para Sideloadly (sin Developer Account)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate iOS config files
        script: |
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign
      - name: Empaquetar .app en .ipa
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r cruise-app.ipa Payload
    artifacts:
      - build/ios/ipa/cruise-app.ipa
      - /tmp/xcodebuild_logs/*.log

  ios-adhoc:
    name: iOS Ad Hoc (instalar en iPhone)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.cruiseapp.cruise
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate iOS config files
        script: |
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build IPA (ad hoc)
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: iOS Release Build (App Store)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cruiseapp.cruise
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate iOS config files
        script: |
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build IPA (App Store)
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true
