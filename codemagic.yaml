workflows:
  ios-sideload:
    name: iOS IPA para Sideloadly (sin Developer Account)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        FLUTTER_XCODE_CODE_SIGNING_ALLOWED: "NO"
        FLUTTER_XCODE_CODE_SIGNING_REQUIRED: "NO"
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate iOS config files
        script: |
          flutter build ios --config-only --no-codesign --no-pub
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          for i in 1 2 3; do
            echo "=== pod install attempt $i ==="
            pod install && break
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done
          if [ ! -d Pods ]; then
            echo "ERROR: Pods directory not found after 3 attempts"
            exit 1
          fi
          echo "CocoaPods installed successfully"
      - name: Disable code signing in project
        script: |
          cd ios
          python3 << 'PYEOF'
          import re, glob

          def patch_pbxproj(path):
              with open(path, 'r') as f:
                  content = f.read()
              # Remove entitlements
              content = re.sub(r'\s*CODE_SIGN_ENTITLEMENTS = [^;]*;', '', content)
              # Clear signing identity
              content = re.sub(r'"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "[^"]*"',
                               '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = ""', content)
              content = re.sub(r'CODE_SIGN_IDENTITY = "[^"]*"',
                               'CODE_SIGN_IDENTITY = ""', content)
              # Remove development team
              content = re.sub(r'DEVELOPMENT_TEAM = [^;]*;',
                               'DEVELOPMENT_TEAM = "";', content)
              # Set manual signing
              content = re.sub(r'CODE_SIGN_STYLE = Automatic',
                               'CODE_SIGN_STYLE = Manual', content)
              # Disable product validation
              content = re.sub(r'VALIDATE_PRODUCT = YES',
                               'VALIDATE_PRODUCT = NO', content)
              # Remove existing CODE_SIGNING_ALLOWED/REQUIRED lines to avoid dupes
              content = re.sub(r'\n\s*CODE_SIGNING_ALLOWED = [^;]*;', '', content)
              content = re.sub(r'\n\s*CODE_SIGNING_REQUIRED = [^;]*;', '', content)
              # Inject CODE_SIGNING_ALLOWED=NO into every buildSettings block
              content = content.replace(
                  'buildSettings = {',
                  'buildSettings = {\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;'
              )
              with open(path, 'w') as f:
                  f.write(content)
              print(f"Patched: {path}")

          patch_pbxproj('Runner.xcodeproj/project.pbxproj')
          for p in glob.glob('Pods/**/*.pbxproj', recursive=True):
              patch_pbxproj(p)
          PYEOF

          # Inject into xcconfig (no leading spaces)
          printf 'CODE_SIGNING_ALLOWED=NO\nCODE_SIGNING_REQUIRED=NO\nCODE_SIGN_IDENTITY=\nCODE_SIGN_ENTITLEMENTS=\nEXPANDED_CODE_SIGN_IDENTITY=\n' >> Flutter/Release.xcconfig
      - name: Flutter build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign --no-tree-shake-icons
          # Verify .app was actually built
          APP=$(find build/ios/iphoneos -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found in build/ios/iphoneos"
            echo "Searching entire build directory..."
            find build/ios -name "*.app" -type d 2>/dev/null
            exit 1
          fi
          # Verify .app is not empty
          APP_SIZE=$(du -sm "$APP" | cut -f1)
          echo "Build succeeded: $APP ($APP_SIZE MB)"
          if [ "$APP_SIZE" -lt 5 ]; then
            echo "ERROR: .app bundle too small ($APP_SIZE MB) - build likely failed"
            ls -la "$APP/"
            exit 1
          fi
      - name: Empaquetar .app en .ipa
        script: |
          APP_PATH=$(find build/ios/iphoneos -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found to package"
            exit 1
          fi
          echo "Packaging: $APP_PATH"

          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/

          cd build/ios/ipa
          zip -r cruise-app.ipa Payload

          # Verify IPA size
          IPA_SIZE=$(du -sm cruise-app.ipa | cut -f1)
          echo "IPA created: cruise-app.ipa ($IPA_SIZE MB)"
          if [ "$IPA_SIZE" -lt 1 ]; then
            echo "ERROR: IPA too small ($IPA_SIZE MB) - packaging failed"
            ls -la Payload/
            exit 1
          fi
    artifacts:
      - build/ios/ipa/cruise-app.ipa
      - /tmp/xcodebuild_logs/*.log

  ios-adhoc:
    name: iOS Ad Hoc (instalar en iPhone)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.cruiseapp.cruise
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate iOS config files
        script: |
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build IPA (ad hoc)
        script: |
          flutter build ipa --release --no-tree-shake-icons
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: iOS Release Build (App Store)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cruiseapp.cruise
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate iOS config files
        script: |
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build IPA (App Store)
        script: |
          flutter build ipa --release --no-tree-shake-icons
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true