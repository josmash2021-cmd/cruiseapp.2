    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        FLUTTER_XCODE_CODE_SIGNING_ALLOWED: "NO"
        FLUTTER_XCODE_CODE_SIGNING_REQUIRED: "NO"
        ENV_API_KEY: "HWB88VurhLM-1GdVML2PT92iqNSbeJ52TU1VO37MBZS6RYlyWvfIpaTdD54GT_5u"
        ENV_HMAC_SECRET: "qUDmTNu1Dxxg_xo7kaUfRba4XiU_5H1ZhkUMDuVrD2dLQ2ImT8JXZ5FgUyXpSJ5h"
        ENV_GOOGLE_MAPS_KEY: "AIzaSyCf2Vya3o8KbubNuV0W_MdKEPMprXeisvo"
        ENV_EMAILJS_SERVICE_ID: "service_kgjbuew"
        ENV_EMAILJS_TEMPLATE_ID: "template_oucb3n9"
        ENV_EMAILJS_PUBLIC_KEY: "5R65y1qr1-lXDwGRb"
        ENV_EMAILJS_PRIVATE_KEY: "xeR8WDCTgskv9g9ITzote"
        ENV_STRIPE_PK: "pk_live_51T4BXG4JZyaaA3VKQmdt1gQp3Mi4jGVSmYZ6aWl8ZEQ7k07gzzGzlOKde9n4zdLbhhmclJKysCdAVnNy5Uh8TeMf00YAldU9fo"
        ENV_STRIPE_MERCHANT: "merchant.com.cruise.app"
        ENV_TWILIO_SID: "AC0bd6acdd300ffe9df86f02d60b6473c9"
        ENV_TWILIO_TOKEN: "f18366886cb6b548d697a683ebdfc229"
        ENV_TWILIO_SERVICE: "VA023301cd93dfccb77cd2ca95e59f688b"
        ENV_PAYPAL_SANDBOX: "false"
        ENV_PAYPAL_CLIENT_ID: "REPLACE_WITH_PAYPAL_CLIENT_ID"
        ENV_PAYPAL_SECRET: "REPLACE_WITH_PAYPAL_SECRET"
    scripts:
      - name: Generate env.dart
        script: |
          cat > lib/config/env.dart << ENVEOF
          class Env {
            static const String apiKey = '${ENV_API_KEY}';
            static const String hmacSecret = '${ENV_HMAC_SECRET}';
            static const String googleMapsKey = '${ENV_GOOGLE_MAPS_KEY}';
            static const String emailjsServiceId = '${ENV_EMAILJS_SERVICE_ID}';
            static const String emailjsTemplateId = '${ENV_EMAILJS_TEMPLATE_ID}';
            static const String emailjsPublicKey = '${ENV_EMAILJS_PUBLIC_KEY}';
            static const String emailjsPrivateKey = '${ENV_EMAILJS_PRIVATE_KEY}';
            static const String stripePublishableKey = '${ENV_STRIPE_PK}';
            static const String stripeMerchantId = '${ENV_STRIPE_MERCHANT}';
            static const String twilioAccountSid = '${ENV_TWILIO_SID}';
            static const String twilioAuthToken = '${ENV_TWILIO_TOKEN}';
            static const String twilioServiceSid = '${ENV_TWILIO_SERVICE}';
            static const bool paypalSandbox = ${ENV_PAYPAL_SANDBOX};
            static const String paypalClientId = '${ENV_PAYPAL_CLIENT_ID}';
            static const String paypalSecret = '${ENV_PAYPAL_SECRET}';
          }
          ENVEOF
          echo "env.dart generated:"
          cat lib/config/env.dart
      - name: Configure Git for better network handling
        script: |
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          echo "Git configured for large transfers"
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate iOS config files
        script: |
          flutter build ios --config-only --no-codesign --no-pub
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          # Limpiar cache de CocoaPods
          rm -rf ~/Library/Caches/CocoaPods
          rm -rf Pods Podfile.lock
          
          # Configurar timeouts más largos
          export COCOAPODS_DISABLE_STATS=true
          
          # Reintentar hasta 5 veces con esperas progresivas
          for i in 1 2 3 4 5; do
            echo "=== pod install attempt $i/5 ==="
            
            # Usar --verbose para ver exactamente dónde falla
            if pod install --repo-update --verbose; then
              echo "✅ CocoaPods installed successfully on attempt $i"
              break
            fi
            
            if [ $i -lt 5 ]; then
              WAIT_TIME=$((i * 30))
              echo "⚠️ Attempt $i failed, waiting ${WAIT_TIME}s before retry..."
              sleep $WAIT_TIME
            else
              echo "❌ ERROR: All 5 pod install attempts failed"
              exit 1
            fi
          done
          
          # Verificar que Pods existe y tiene contenido
          if [ ! -d Pods ] || [ -z "$(ls -A Pods)" ]; then
            echo "ERROR: Pods directory is missing or empty"
            exit 1
          fi
          
          echo "CocoaPods dependencies installed successfully"
          echo "Pods directory size: $(du -sh Pods | cut -f1)"
      - name: Disable code signing in project
        script: |
          cd ios
          python3 << 'PYEOF'
          import re, glob

          def patch_pbxproj(path):
              with open(path, 'r') as f:
                  content = f.read()
              # Remove entitlements
              content = re.sub(r'\s*CODE_SIGN_ENTITLEMENTS = [^;]*;', '', content)
              # Clear signing identity
              content = re.sub(r'"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "[^"]*"',
                               '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = ""', content)
              content = re.sub(r'CODE_SIGN_IDENTITY = "[^"]*"',
                               'CODE_SIGN_IDENTITY = ""', content)
              # Remove development team
              content = re.sub(r'DEVELOPMENT_TEAM = [^;]*;',
                               'DEVELOPMENT_TEAM = "";', content)
              # Set manual signing
              content = re.sub(r'CODE_SIGN_STYLE = Automatic',
                               'CODE_SIGN_STYLE = Manual', content)
              # Disable product validation
              content = re.sub(r'VALIDATE_PRODUCT = YES',
                               'VALIDATE_PRODUCT = NO', content)
              # Remove existing CODE_SIGNING_ALLOWED/REQUIRED lines to avoid dupes
              content = re.sub(r'\n\s*CODE_SIGNING_ALLOWED = [^;]*;', '', content)
              content = re.sub(r'\n\s*CODE_SIGNING_REQUIRED = [^;]*;', '', content)
              # Inject CODE_SIGNING_ALLOWED=NO into every buildSettings block
              content = content.replace(
                  'buildSettings = {',
                  'buildSettings = {\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;'
              )
              with open(path, 'w') as f:
                  f.write(content)
              print(f"Patched: {path}")

          patch_pbxproj('Runner.xcodeproj/project.pbxproj')
          for p in glob.glob('Pods/**/*.pbxproj', recursive=True):
              patch_pbxproj(p)
          PYEOF

          # Inject into xcconfig (no leading spaces)
          printf 'CODE_SIGNING_ALLOWED=NO\nCODE_SIGNING_REQUIRED=NO\nCODE_SIGN_IDENTITY=\nCODE_SIGN_ENTITLEMENTS=\nEXPANDED_CODE_SIGN_IDENTITY=\n' >> Flutter/Release.xcconfig
      - name: Flutter build iOS (no codesign)
        script: |
          # flutter build ios compiles Dart → ARM and runs xcodebuild internally.
          # --no-codesign   : skips signing (CODE_SIGNING_ALLOWED=NO already set in Podfile)
          # --no-tree-shake-icons : required because the project uses non-constant IconData
          flutter build ios \
            --release \
            --no-codesign \
            --no-tree-shake-icons

          # flutter always outputs to build/ios/iphoneos/Runner.app
          APP="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: Runner.app not found at $APP"
            find build/ios -type d -name "*.app" 2>/dev/null
            exit 1
          fi

          APP_SIZE=$(du -sm "$APP" | cut -f1)
          echo "Build OK: $APP (${APP_SIZE} MB)"
          if [ "$APP_SIZE" -lt 5 ]; then
            echo "ERROR: .app is too small (${APP_SIZE} MB) — Dart compilation likely failed"
            ls -la "$APP/"
            exit 1
          fi
      - name: Empaquetar .app en .ipa
        script: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found at $APP_PATH"
            exit 1
          fi
          echo "Packaging: $APP_PATH ($(du -sh "$APP_PATH" | cut -f1))"

          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/Runner.app

          cd build/ios/ipa
          echo "Payload contents:"; ls -la Payload/

          zip -r cruise-app.ipa Payload

          IPA_SIZE_BYTES=$(stat -f%z cruise-app.ipa 2>/dev/null || stat -c%s cruise-app.ipa 2>/dev/null)
          echo "IPA: cruise-app.ipa (${IPA_SIZE_BYTES} bytes)"
          if [ "${IPA_SIZE_BYTES}" -lt 50000 ]; then
            echo "ERROR: IPA too small — packaging failed"
            exit 1
          fi
          echo "IPA packaging completed successfully"
    artifacts:
      - build/ios/ipa/cruise-app.ipa
      - /tmp/xcodebuild_logs/*.log

