workflows:
  ios-sideload:
    name: iOS IPA para Sideloadly (sin Developer Account)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate iOS config files
        script: |
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Disable code signing in project
        script: |
          cd ios
          # Disable code signing for all targets in project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = .*;/CODE_SIGN_IDENTITY = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = .*;/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "";/g' Runner.xcodeproj/project.pbxproj
          # Inject CODE_SIGNING_ALLOWED = NO and CODE_SIGNING_REQUIRED = NO
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER/CODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER/g' Runner.xcodeproj/project.pbxproj
      - name: Flutter build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign --no-tree-shake-icons \
            --suppress-analytics \
            2>&1 | tee /tmp/flutter_build.log
          # fallback: try debug if release fails
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Release failed, trying debug..."
            flutter build ios --debug --no-codesign --no-tree-shake-icons
          fi
      - name: Empaquetar .app en .ipa
        script: |
          APP_PATH=$(find build/ios -name "*.app" -type d | head -1)
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r cruise-app.ipa Payload
    artifacts:
      - build/ios/ipa/cruise-app.ipa
      - /tmp/xcodebuild_logs/*.log

  ios-adhoc:
    name: iOS Ad Hoc (instalar en iPhone)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.cruiseapp.cruise
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate iOS config files
        script: |
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build IPA (ad hoc)
        script: |
          flutter build ipa --release --no-tree-shake-icons
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: iOS Release Build (App Store)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cruiseapp.cruise
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate iOS config files
        script: |
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build IPA (App Store)
        script: |
          flutter build ipa --release --no-tree-shake-icons
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true
