<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cruise QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #111;
      border-radius: 28px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      border: 1.5px solid #2a2a2a;
      box-shadow: 0 0 60px rgba(232, 197, 71, 0.08);
    }
    .logo-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #E8C547;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-ring svg {
      width: 54px;
      height: 54px;
    }
    .brand {
      color: #E8C547;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .tagline {
      color: #666;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: -16px;
    }
    .qr-wrapper {
      position: relative;
      width: 260px;
      height: 260px;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      padding: 16px;
      border: 2px solid #E8C547;
    }
    #qrcode {
      width: 228px;
      height: 228px;
    }
    #qrcode canvas,
    #qrcode img {
      width: 228px !important;
      height: 228px !important;
    }
    .qr-center-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #000;
      border: 2.5px solid #E8C547;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-center-icon svg {
      width: 28px;
      height: 28px;
    }
    .url-label {
      color: #555;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    .url-label span {
      color: #E8C547;
    }
    .download-btn {
      background: #E8C547;
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 12px 32px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .download-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-ring">
      <svg viewBox="0 0 200 170" xmlns="http://www.w3.org/2000/svg">
        <!-- Full car silhouette -->
        <path d="
          M 60,155 L 60,140 L 20,140 L 12,120 L 8,90
          Q 8,75 22,75 L 38,75 L 52,35
          Q 58,18 75,14 L 125,14
          Q 142,18 148,35 L 162,75 L 178,75
          Q 192,75 192,90 L 188,120 L 180,140 L 140,140 L 140,155 L 120,155 L 120,140 L 80,140 L 80,155 Z
        " fill="#E8C547"/>
        <!-- Windshield dark cutout -->
        <path d="
          M 60,73 L 72,36
          Q 76,20 82,16 L 118,16
          Q 124,20 128,36 L 140,73 Z
        " fill="#000" opacity="0.6"/>
        <!-- Left headlight -->
        <ellipse cx="45" cy="108" rx="24" ry="17" fill="#000" opacity="0.6"/>
        <!-- Right headlight -->
        <ellipse cx="155" cy="108" rx="24" ry="17" fill="#000" opacity="0.6"/>
      </svg>
    </div>

    <div class="brand">CRUISE</div>
    <div class="tagline">Ride with confidence</div>

    <div class="qr-wrapper">
      <div id="qrcode"></div>
      <div class="qr-center-icon">
        <svg viewBox="0 0 200 170" xmlns="http://www.w3.org/2000/svg">
          <path d="M 60,155 L 60,140 L 20,140 L 12,120 L 8,90 Q 8,75 22,75 L 38,75 L 52,35 Q 58,18 75,14 L 125,14 Q 142,18 148,35 L 162,75 L 178,75 Q 192,75 192,90 L 188,120 L 180,140 L 140,140 L 140,155 L 120,155 L 120,140 L 80,140 L 80,155 Z" fill="#E8C547"/>
          <path d="M 60,73 L 72,36 Q 76,20 82,16 L 118,16 Q 124,20 128,36 L 140,73 Z" fill="#000" opacity="0.6"/>
          <ellipse cx="45" cy="108" rx="24" ry="17" fill="#000" opacity="0.6"/>
          <ellipse cx="155" cy="108" rx="24" ry="17" fill="#000" opacity="0.6"/>
        </svg>
      </div>
    </div>

    <div class="url-label">Escanea para visitar <span>cruiseinride.vercel.app</span></div>

    <button class="download-btn" onclick="downloadQR()">Descargar QR</button>
  </div>

  <script>
    const qr = new QRCode(document.getElementById("qrcode"), {
      text: "https://cruiseinride.vercel.app/",
      width: 228,
      height: 228,
      colorDark: "#E8C547",
      colorLight: "#000000",
      correctLevel: QRCode.CorrectLevel.H,
    });

    function downloadQR() {
      const canvas = document.querySelector("#qrcode canvas");
      if (!canvas) { alert("Espera a que cargue el QR"); return; }

      // Create a composite canvas: full QR + center icon
      const out = document.createElement("canvas");
      out.width = 500;
      out.height = 500;
      const ctx = out.getContext("2d");

      // Background
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, 500, 500);

      // QR centered
      ctx.drawImage(canvas, 0, 0, 500, 500);

      // Center circle (mask)
      const cx = 250, cy = 250, r = 52;
      ctx.fillStyle = "#000000";
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      // Center ring
      ctx.strokeStyle = "#E8C547";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.stroke();

      // Download
      const link = document.createElement("a");
      link.download = "cruise_qr.png";
      link.href = out.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
