<!DOCTYPE html>
<!-- DISPATCH_v4 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cruise Dispatch</title>
<style>
/* ── Reset & Base ── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d0d0f;color:#f0f0f0;min-height:100vh}
:root{--gold:#E8C547;--gold2:#f5d56e;--green:#4CAF50;--red:#f44336;--blue:#2196F3;--orange:#FF9800;--surface:#1c1c1e;--surface2:#242426;--border:#2a2a2a;--text2:#999;--text3:#555}

/* ── Utilities ── */
.hidden{display:none!important}
.flex{display:flex;align-items:center}
.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Login ── */
.login-wrap{max-width:420px;margin:80px auto;background:var(--surface);padding:40px;border-radius:20px;border:1px solid var(--border)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{color:var(--gold);font-size:28px;font-weight:900;letter-spacing:2px}
.login-logo p{color:var(--text2);font-size:13px;margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;color:#aaa;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.form-group input{width:100%;padding:12px 14px;background:#0a0a0a;border:1px solid var(--border);border-radius:10px;color:#fff;font-size:15px;transition:border-color .2s}
.form-group input:focus{border-color:var(--gold);outline:none}
.btn-login{width:100%;padding:14px;background:var(--gold);color:#000;border:none;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;transition:background .2s}
.btn-login:hover{background:var(--gold2)}
#loginErr{color:var(--red);text-align:center;margin-top:12px;font-size:13px;display:none}

/* ── Header ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px}
.header-top{display:flex;justify-content:space-between;align-items:center;padding:14px 0}
.header-top h1{color:var(--gold);font-size:20px;font-weight:900;letter-spacing:1.5px}
.header-right{display:flex;gap:12px;align-items:center}
.conn-dot{color:var(--green);font-size:12px;font-weight:600}
.btn-sm{padding:8px 16px;background:var(--gold);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-sm:hover{background:var(--gold2)}
.btn-danger{background:var(--red)!important;color:#fff!important}
.btn-danger:hover{background:#e53935!important}
.btn-outline{background:transparent!important;border:1px solid var(--border)!important;color:var(--text2)!important}
.btn-outline:hover{border-color:#555!important;color:#fff!important}

/* ── Stats Bar ── */
.stats-bar{display:flex;gap:0;border-top:1px solid var(--border);overflow-x:auto}
.stat-item{flex:1;min-width:100px;padding:12px 16px;text-align:center;border-right:1px solid var(--border);cursor:default}
.stat-item:last-child{border-right:none}
.stat-val{font-size:22px;font-weight:800;color:var(--gold);line-height:1}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* ── Container & Tabs ── */
.container{max-width:1400px;margin:0 auto;padding:20px 24px}
.tabs{display:flex;gap:4px;margin-bottom:22px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:5px}
.tab{padding:9px 18px;background:transparent;border:none;color:var(--text2);cursor:pointer;border-radius:8px;font-size:14px;font-weight:600;transition:all .18s;white-space:nowrap}
.tab.active{background:var(--gold);color:#000}
.tab:hover:not(.active){background:var(--surface2);color:#fff}

/* ── Section Header ── */
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.section-title{font-size:18px;font-weight:800}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-input{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:13px;width:220px;transition:border-color .2s}
.search-input:focus{border-color:var(--gold);outline:none}
.filter-select{background:var(--surface2);border:1px solid var(--border);color:#fff;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer}
.filter-select:focus{border-color:var(--gold);outline:none}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px}
.loading{text-align:center;padding:60px;color:var(--text3);font-size:15px}
.err-box{background:rgba(244,67,54,.1);border:1px solid #f44336;color:#f44336;padding:12px 16px;border-radius:10px;font-size:13px}

/* ── User Card ── */
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:border-color .2s}
.card:hover{border-color:#3a3a3a}
.card-top{padding:16px 16px 0}
.user-hdr{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.avatar{width:54px;height:54px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0;border:2px solid var(--border)}
.avatar img{width:100%;height:100%;object-fit:cover}
.user-meta{flex:1;min-width:0}
.user-meta h3{font-size:16px;font-weight:700;margin-bottom:2px}
.user-meta .contact{color:var(--text2);font-size:12px;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-meta .joined{color:var(--text3);font-size:11px;margin-top:4px}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge-driver{background:var(--gold);color:#000}
.badge-rider{background:#1a4a2a;color:var(--green)}
.badge-admin{background:#2d1a4a;color:#ce93d8}
.badge-pending{background:#3a2800;color:var(--orange)}
.badge-approved,.badge-verified{background:#1a2d4a;color:#64b5f6}
.badge-rejected{background:#3a1a1a;color:var(--red)}
.badge-active{background:#1a3a1a;color:var(--green)}
.badge-blocked,.badge-deleted{background:#3a1a1a;color:var(--red)}
.badge-none,.badge-inactive{background:#222;color:#666}
.badge-completed{background:#1a3a1a;color:var(--green)}
.badge-in_trip,.badge-driver_en_route{background:#1a2d4a;color:#64b5f6}
.badge-requested{background:#3a2800;color:var(--orange)}
.badge-canceled,.badge-cancelled{background:#3a1a1a;color:var(--red)}

/* ── Info Rows ── */
.info-rows{padding:0 16px;border-top:1px solid var(--border);margin-top:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a;gap:8px}
.info-row:last-child{border-bottom:none}
.info-lbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.info-val{font-size:13px;color:#ddd;font-family:monospace;word-break:break-all;text-align:right}
.info-val.sensitive{color:var(--gold)}
.reveal-btn{background:var(--surface2);border:1px solid var(--border);color:var(--gold);padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:700;flex-shrink:0}
.reveal-btn:hover{background:#333}
.copy-btn{background:var(--surface2);border:1px solid var(--border);color:#aaa;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;flex-shrink:0}
.copy-btn:hover{color:#fff;background:#333}

/* ── Video ── */
.card-video{padding:0 16px 12px}
video{width:100%;max-height:220px;border-radius:8px;background:#000;display:block}
.no-video{color:var(--text3);font-size:12px;text-align:center;padding:10px 0}

/* ── Doc Grid ── */
.card-docs{padding:0 16px 12px}
.doc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.doc-img{aspect-ratio:1;background:#111;border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid var(--border);position:relative}
.doc-img img{width:100%;height:100%;object-fit:cover}
.doc-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#fff;font-size:9px;text-align:center;padding:2px;font-weight:600}

/* ── Expandable Sections ── */
.expand-section{border-top:1px solid var(--border)}
.expand-section.hidden-section{display:none}
.expand-inner{padding:12px 16px;background:#111}

/* ── Actions ── */
.card-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;background:var(--surface2)}
.action-btn{flex:1;min-width:56px;padding:8px 6px;border:none;border-radius:7px;cursor:pointer;font-weight:700;font-size:12px;transition:opacity .15s}
.action-btn:hover{opacity:.85}
.btn-approve{background:#1b5e20;color:#a5d6a7}
.btn-reject{background:#b71c1c;color:#ef9a9a}
.btn-block{background:#e65100;color:#ffe0b2}
.btn-unblock{background:#1b5e20;color:#a5d6a7}
.btn-delete{background:#b71c1c;color:#ef9a9a}
.btn-view{background:#0d47a1;color:#90caf9}
.btn-pay{background:#1a237e;color:#9fa8da}
.btn-chat-hist{background:#1a237e;color:#9fa8da}

/* ── Trip Card ── */
.trip-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.trip-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.trip-id{font-size:15px;font-weight:800}
.trip-body{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.trip-field{font-size:12px}
.trip-field span{color:var(--text3);display:block;margin-bottom:2px;text-transform:uppercase;font-size:10px;letter-spacing:.4px}
.trip-route{padding:0 16px 12px;font-size:12px;color:var(--text2)}
.trip-route .route-arrow{color:var(--gold);margin:0 6px}

/* ── Chat Cards ── */
.chat-list{display:flex;flex-direction:column;gap:10px}
.chat-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.chat-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.chat-header:hover{background:var(--surface2)}
.chat-user{font-size:15px;font-weight:700}
.chat-meta{font-size:12px;color:#666;margin-top:2px}
.chat-status-open{color:var(--green);font-weight:700;font-size:12px}
.chat-status-closed{color:#555;font-weight:700;font-size:12px}
.badge-unread{background:var(--red);color:#fff;border-radius:20px;padding:2px 7px;font-size:11px;font-weight:700;margin-left:6px}
.chat-body{display:none;border-top:1px solid var(--border);padding:14px 16px}
.chat-body.open{display:block}
.messages{max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;padding-right:4px}
.messages::-webkit-scrollbar{width:4px}.messages::-webkit-scrollbar-track{background:#111}.messages::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.msg-bubble{max-width:80%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5}
.msg-user{background:#2a2a2a;align-self:flex-start;border-radius:4px 10px 10px 10px}
.msg-dispatch{background:#1a3a1a;align-self:flex-end;text-align:right;border-radius:10px 4px 10px 10px}
.msg-bot,.msg-system{background:#1a1a2e;align-self:flex-start;font-style:italic;color:#aaa;border-radius:4px 10px 10px 10px}
.msg-sender{font-size:10px;color:#666;margin-bottom:2px;font-weight:600}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px}
.reply-row{display:flex;gap:8px;margin-top:8px}
.reply-input{flex:1;padding:10px 14px;background:#111;border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px;transition:border-color .2s}
.reply-input:focus{border-color:var(--gold);outline:none}
.chat-actions{display:flex;gap:8px;margin-bottom:10px}
.btn-close-chat{background:#b71c1c;color:#ef9a9a;border:none;padding:7px 14px;border-radius:7px;cursor:pointer;font-weight:700;font-size:12px}
.btn-send{background:var(--gold);color:#000;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:800;font-size:13px}

/* ── Chat History in user card ── */
.hist-section{background:#111;border-radius:8px;padding:10px}
.hist-title{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.hist-item{padding:7px 0;border-bottom:1px solid #1a1a1a;cursor:pointer;font-size:13px}
.hist-item:last-child{border-bottom:none}
.hist-item:hover{color:var(--gold)}

/* ── Payment Methods ── */
.pm-box{background:#111;border-radius:8px;padding:10px}
.pm-title{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.pm-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1a1a1a}
.pm-item:last-child{border-bottom:none}
.pm-icon{font-size:16px;width:24px;text-align:center}
.pm-name{font-size:13px;color:#ccc;flex:1}
.pm-default{font-size:10px;color:var(--gold);font-weight:700;background:rgba(232,197,71,.12);padding:2px 7px;border-radius:4px}
.pm-empty{font-size:12px;color:#444;font-style:italic}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#444}
</style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="loginScreen" class="login-wrap">
    <div class="login-logo">
        <h1>CRUISE</h1>
        <p>Dispatch Panel &mdash; Owner Access Only</p>
    </div>
    <div class="form-group">
        <label>Server URL</label>
        <input type="text" id="serverUrl" value="http://localhost:8000" placeholder="https://your-server.com">
    </div>
    <div class="form-group">
        <label>Owner Email</label>
        <input type="email" id="ownerEmail" placeholder="owner@email.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="ownerPassword" placeholder="Owner password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">Login to Dispatch</button>
    <p id="loginErr"></p>
</div>

<!-- ═══════════ DASHBOARD ═══════════ -->
<div id="dashboard" class="hidden">

    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <h1>&#9654; CRUISE DISPATCH</h1>
            <div class="header-right">
                <span class="conn-dot">&#11044; Live</span>
                <button class="btn-sm btn-outline" onclick="refreshAll()">&#8635; Refresh</button>
                <button class="btn-sm btn-danger" onclick="doLogout()">Logout</button>
            </div>
        </div>
        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total Users</div></div>
            <div class="stat-item"><div class="stat-val" id="stat-drivers">—</div><div class="stat-lbl">Drivers</div></div>
            <div class="stat-item"><div class="stat-val" id="stat-riders">—</div><div class="stat-lbl">Riders</div></div>
            <div class="stat-item"><div class="stat-val" id="stat-pending">—</div><div class="stat-lbl">Pending Verif.</div></div>
            <div class="stat-item"><div class="stat-val" id="stat-trips">—</div><div class="stat-lbl">Total Trips</div></div>
            <div class="stat-item"><div class="stat-val" id="stat-chats">—</div><div class="stat-lbl">Open Chats</div></div>
        </div>
    </div>

    <div class="container">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" id="tab-verifications" onclick="showTab('verifications',this)">&#9989; Verifications</button>
            <button class="tab" id="tab-drivers" onclick="showTab('drivers',this)">&#128665; Drivers</button>
            <button class="tab" id="tab-riders" onclick="showTab('riders',this)">&#128100; Riders</button>
            <button class="tab" id="tab-trips" onclick="showTab('trips',this)">&#128664; Trips</button>
            <button class="tab" id="tab-chats" onclick="showTab('chats',this)">&#128172; Live Chats</button>
        </div>

        <!-- ── VERIFICATIONS TAB ── -->
        <div id="verificationsTab">
            <div class="section-hdr">
                <span class="section-title">Pending Verifications</span>
                <div class="toolbar">
                    <input class="search-input" type="text" id="verifSearch" placeholder="Search name / email…" oninput="filterCards('verificationsList',this.value)">
                    <button class="btn-sm" onclick="loadVerifications()">&#8635; Refresh</button>
                </div>
            </div>
            <div id="verificationsList" class="grid"><div class="loading">Loading…</div></div>
        </div>

        <!-- ── DRIVERS TAB ── -->
        <div id="driversTab" class="hidden">
            <div class="section-hdr">
                <span class="section-title">Drivers</span>
                <div class="toolbar">
                    <input class="search-input" type="text" id="driversSearch" placeholder="Search name / email / phone…" oninput="filterCards('driversList',this.value)">
                    <select class="filter-select" id="driversStatusFilter" onchange="loadDrivers()">
                        <option value="">All Statuses</option>
                        <option value="active">Active</option>
                        <option value="blocked">Blocked</option>
                        <option value="pending_deletion">Pending Deletion</option>
                    </select>
                    <button class="btn-sm" onclick="loadDrivers()">&#8635; Refresh</button>
                </div>
            </div>
            <div id="driversList" class="grid"><div class="loading">Loading…</div></div>
        </div>

        <!-- ── RIDERS TAB ── -->
        <div id="ridersTab" class="hidden">
            <div class="section-hdr">
                <span class="section-title">Riders</span>
                <div class="toolbar">
                    <input class="search-input" type="text" id="ridersSearch" placeholder="Search name / email / phone…" oninput="filterCards('ridersList',this.value)">
                    <select class="filter-select" id="ridersStatusFilter" onchange="loadRiders()">
                        <option value="">All Statuses</option>
                        <option value="active">Active</option>
                        <option value="blocked">Blocked</option>
                    </select>
                    <button class="btn-sm btn-danger" onclick="deleteAllUsers()">&#128465; Delete All</button>
                    <button class="btn-sm" onclick="loadRiders()">&#8635; Refresh</button>
                </div>
            </div>
            <div id="ridersList" class="grid"><div class="loading">Loading…</div></div>
        </div>

        <!-- ── TRIPS TAB ── -->
        <div id="tripsTab" class="hidden">
            <div class="section-hdr">
                <span class="section-title">Trips</span>
                <div class="toolbar">
                    <select class="filter-select" id="tripStatusFilter" onchange="loadTrips()">
                        <option value="">All Statuses</option>
                        <option value="requested">Requested</option>
                        <option value="driver_en_route">En Route</option>
                        <option value="arrived">Arrived</option>
                        <option value="in_trip">In Trip</option>
                        <option value="completed">Completed</option>
                        <option value="canceled">Canceled</option>
                        <option value="scheduled">Scheduled</option>
                    </select>
                    <button class="btn-sm" onclick="loadTrips()">&#8635; Refresh</button>
                    <span style="font-size:11px;color:var(--text3)">Auto 30s</span>
                </div>
            </div>
            <div id="tripsList" class="grid"><div class="loading">Loading…</div></div>
        </div>

        <!-- ── LIVE CHATS TAB ── -->
        <div id="chatsTab" class="hidden">
            <div class="section-hdr">
                <span class="section-title">Live Chats</span>
                <div class="toolbar">
                    <label class="flex gap8" style="color:#aaa;font-size:13px;cursor:pointer">
                        <input type="checkbox" id="showClosed" onchange="loadChats()"> Show closed
                    </label>
                    <button class="btn-sm" onclick="loadChats()">&#8635; Refresh</button>
                    <span style="font-size:11px;color:var(--text3)">Auto 30s</span>
                </div>
            </div>
            <div id="chatsList" class="chat-list"><div class="loading">Loading…</div></div>
        </div>

    </div><!-- /container -->
</div><!-- /dashboard -->

<script>
'use strict';
let serverUrl = '', ownerToken = '';
const hdrs = () => ({'Authorization': `Bearer ${ownerToken}`, 'Content-Type': 'application/json'});

// ── Audio notification ────────────────────────────────
let _audioCtx = null;
function _playBeep() {
    try {
        if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const o = _audioCtx.createOscillator(), g = _audioCtx.createGain();
        o.connect(g); g.connect(_audioCtx.destination);
        o.frequency.value = 880; o.type = 'sine';
        g.gain.setValueAtTime(0.35, _audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.45);
        o.start(); o.stop(_audioCtx.currentTime + 0.45);
    } catch(_){}
}
let _knownChatIds = new Set();

// ── Auth ──────────────────────────────────────────────
async function doLogin() {
    serverUrl = document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
    const email = document.getElementById('ownerEmail').value.trim();
    const password = document.getElementById('ownerPassword').value;
    const errEl = document.getElementById('loginErr');
    errEl.style.display = 'none';
    if (!serverUrl || !email || !password) { showLoginErr('Fill in all fields'); return; }
    try {
        const r = await fetch(`${serverUrl}/dispatch/login`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, password})
        });
        const d = await r.json();
        if (!r.ok) { showLoginErr(d.detail || 'Invalid credentials'); return; }
        ownerToken = d.token;
        localStorage.setItem('dispatchToken', ownerToken);
        localStorage.setItem('dispatchServerUrl', serverUrl);
        openDashboard();
    } catch(e) { showLoginErr('Cannot connect: ' + e.message); }
}

function showLoginErr(msg) {
    const e = document.getElementById('loginErr');
    e.textContent = msg; e.style.display = 'block';
}

async function doLogout() {
    try { await fetch(`${serverUrl}/dispatch/logout`, {method:'POST', headers: hdrs()}); } catch(_){}
    ownerToken = '';
    localStorage.removeItem('dispatchToken');
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('ownerPassword').value = '';
    clearAutoRefreshTimers();
}

function openDashboard() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadStats();
    loadVerifications();
    loadDrivers();
    loadRiders();
    loadTrips();
    loadChats();
}

function refreshAll() {
    loadStats();
    const activeTab = document.querySelector('.tab.active');
    const name = activeTab?.id?.replace('tab-','');
    if (name === 'verifications') loadVerifications();
    else if (name === 'drivers') loadDrivers();
    else if (name === 'riders') loadRiders();
    else if (name === 'trips') loadTrips();
    else if (name === 'chats') loadChats();
}

window.addEventListener('load', function() {
    const u = localStorage.getItem('dispatchServerUrl');
    const t = localStorage.getItem('dispatchToken');
    if (u) document.getElementById('serverUrl').value = u;
    if (t && u) {
        ownerToken = t; serverUrl = u;
        fetch(`${serverUrl}/admin/stats`, {headers: hdrs()}).then(r => {
            if (r.ok) openDashboard();
            else localStorage.removeItem('dispatchToken');
        }).catch(() => localStorage.removeItem('dispatchToken'));
    }
});

// ── Stats ─────────────────────────────────────────────
async function loadStats() {
    try {
        const r = await fetch(`${serverUrl}/admin/stats`, {headers: hdrs()});
        if (!r.ok) return;
        const d = await r.json();
        document.getElementById('stat-total').textContent = d.total_users ?? '—';
        document.getElementById('stat-drivers').textContent = d.total_drivers ?? '—';
        document.getElementById('stat-riders').textContent = d.total_riders ?? '—';
        document.getElementById('stat-pending').textContent = d.pending_verifications ?? '—';
        document.getElementById('stat-trips').textContent = d.total_trips ?? '—';
        document.getElementById('stat-chats').textContent = d.open_chats ?? '—';

}

// ── Tabs ──────────────────────────────────────────────
const TAB_NAMES = ['verifications','drivers','riders','trips','chats'];
function showTab(name, el) {
    TAB_NAMES.forEach(t => {
        document.getElementById(t+'Tab').classList.add('hidden');
        document.getElementById('tab-'+t).classList.remove('active');
    });
    document.getElementById(name+'Tab').classList.remove('hidden');
    el.classList.add('active');
}

// ── Search filter (client-side) ───────────────────────
function filterCards(containerId, q) {
    const lower = q.toLowerCase();
    document.querySelectorAll(`#${containerId} .card`).forEach(card => {
        card.style.display = card.textContent.toLowerCase().includes(lower) ? '' : 'none';
    });
}

async function deleteAllUsers() {
    if (!confirm('⚠️ DELETE ALL RIDERS? Permanent!')) return;

// ── Render User Cards ─────────────────────────────────
function renderUserCards(users, containerId, showVerifActions) {
    const el = document.getElementById(containerId);
    if (!users || !users.length) { el.innerHTML = '<div class="loading">No records found</div>'; return; }
    el.innerHTML = users.map(u => buildUserCard(u, showVerifActions)).join('');
}

function buildUserCard(u, showVerifActions) {
    const pw = u.password_visible || '';
    const hasPw = pw.length > 0;
    const ssn = u.ssn || '';
    const hasSSN = ssn.length > 0;
    const isDriver = u.role === 'driver';
    const vidSrc = u.video_url ? (u.video_url.startsWith('http') ? u.video_url : serverUrl + u.video_url) : '';

    const docImgs = [
        {url: u.id_photo_url, label:'ID'},
        {url: u.selfie_url, label:'Selfie'},
        {url: u.license_front_url, label:'License F'},
        {url: u.license_back_url, label:'License B'},
        {url: u.vehicle_registration_url, label:'Reg'},
        {url: u.insurance_url, label:'Insurance'},
    ].filter(d => d.url).map(d => ({
        url: d.url.startsWith('http') ? d.url : serverUrl + d.url,
        label: d.label
    }));

    const joinDate = u.created_at ? new Date(u.created_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '';
    const isBlocked = u.status === 'blocked';

    return `<div class="card" id="card-${u.id}">
        <div class="card-top">
            <div class="user-hdr">
                <div class="avatar">${u.photo_url
                    ? `<img src="${u.photo_url.startsWith('http') ? u.photo_url : serverUrl+u.photo_url}" onerror="this.parentElement.textContent='👤'">`
                    : (isDriver ? '🚗' : '👤')}</div>
                <div class="user-meta">
                    <h3>${esc(u.first_name)} ${esc(u.last_name)}</h3>
                    <div class="contact">${esc(u.email || '')} ${u.email && u.phone ? '·' : ''} ${esc(u.phone || '')}</div>
                    <div class="badges">
                        <span class="badge badge-${u.role}">${u.role.toUpperCase()}</span>
                        <span class="badge badge-${u.verification_status||'none'}">${u.verification_status||'none'}</span>
                        <span class="badge badge-${u.status||'active'}">${u.status||'active'}</span>
                    </div>
                    ${joinDate ? `<div class="joined">Joined ${joinDate} · ID #${u.id}</div>` : `<div class="joined">ID #${u.id}</div>`}
                </div>
            </div>
        </div>

        <!-- Info Rows -->
        <div class="info-rows">
            <div class="info-row">
                <span class="info-lbl">Password</span>
                <div class="flex gap8" style="flex:1;justify-content:flex-end">
                    <span class="info-val sensitive" id="pw-${u.id}">${hasPw ? '••••••••' : '—'}</span>
                    ${hasPw ? `<button class="reveal-btn" onclick="toggleField('pw-${u.id}','${esc(pw)}',this)">Show</button>
                    <button class="copy-btn" onclick="copyText('${esc(pw)}',this)">Copy</button>` : ''}
                </div>
            </div>
            ${isDriver && hasSSN ? `
            <div class="info-row">
                <span class="info-lbl">SSN</span>
                <div class="flex gap8" style="flex:1;justify-content:flex-end">
                    <span class="info-val sensitive" id="ssn-${u.id}">•••-••-••••</span>
                    <button class="reveal-btn" onclick="toggleField('ssn-${u.id}','${esc(ssn)}',this)">Show</button>
                    <button class="copy-btn" onclick="copyText('${esc(ssn)}',this)">Copy</button>
                </div>
            </div>` : (isDriver ? `
            <div class="info-row">
                <span class="info-lbl">SSN</span>
                <span class="info-val" style="color:var(--text3)">Not provided</span>
            </div>` : '')}
            ${u.phone ? `<div class="info-row">
                <span class="info-lbl">Phone</span>
                <div class="flex gap8" style="flex:1;justify-content:flex-end">
                    <span class="info-val">${esc(u.phone)}</span>
                    <button class="copy-btn" onclick="copyText('${esc(u.phone)}',this)">Copy</button>
                </div>
            </div>` : ''}
            ${u.email ? `<div class="info-row">
                <span class="info-lbl">Email</span>
                <div class="flex gap8" style="flex:1;justify-content:flex-end">
                    <span class="info-val" style="font-size:12px">${esc(u.email)}</span>
                    <button class="copy-btn" onclick="copyText('${esc(u.email)}',this)">Copy</button>
                </div>
            </div>` : ''}
        </div>

        ${vidSrc ? `<div class="card-video" style="margin-top:12px"><video controls preload="metadata" src="${vidSrc}"></video></div>`
            : '<div style="padding:4px 16px 4px;font-size:11px;color:var(--text3)">No verification video</div>'}

        ${docImgs.length ? `<div class="card-docs"><div class="doc-grid">${docImgs.map(d=>
            `<div class="doc-img" onclick="window.open('${d.url}','_blank')" title="${d.label}">
                <img src="${d.url}" alt="${d.label}" onerror="this.style.display='none'">
                <div class="doc-lbl">${d.label}</div>
            </div>`).join('')}</div></div>` : ''}

        <!-- Expandable: Chats & Payments -->
        <div id="user-chats-${u.id}" class="expand-section hidden-section">
            <div class="expand-inner" id="user-chats-inner-${u.id}"></div>
        </div>
        <div id="user-pm-${u.id}" class="expand-section hidden-section">
            <div class="expand-inner" id="user-pm-inner-${u.id}"></div>
        </div>

        <!-- Actions -->
        <div class="card-actions">
            ${showVerifActions ? `
                <button class="action-btn btn-approve" onclick="verifyUser(${u.id},'approve')">✓ Approve</button>
                <button class="action-btn btn-reject" onclick="verifyUser(${u.id},'reject')">✗ Reject</button>
            ` : ''}
            ${isBlocked
                ? `<button class="action-btn btn-unblock" onclick="setStatus(${u.id},'active')">Unblock</button>`
                : `<button class="action-btn btn-block" onclick="setStatus(${u.id},'blocked')">Block</button>`}
            <button class="action-btn btn-delete" onclick="deleteUser(${u.id})">Delete</button>
            <button class="action-btn btn-chat-hist" onclick="viewUserChats(${u.id},'${esc(u.first_name+' '+u.last_name)}')">Chats</button>
            <button class="action-btn btn-pay" onclick="viewUserPayments(${u.id})">&#128179; Pay</button>
        </div>
    </div>`;
}

// ── Field reveal / copy ───────────────────────────────
function toggleField(elId, value, btn) {
    const el = document.getElementById(elId);
    const isMasked = el.textContent.includes('•');
    el.textContent = isMasked ? value : (elId.startsWith('ssn') ? '•••-••-••••' : '••••••••');
    btn.textContent = isMasked ? 'Hide' : 'Show';
}

function copyText(value, btn) {
    navigator.clipboard.writeText(value).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓';
        setTimeout(() => btn.textContent = orig, 1500);
    });
}

// ── User actions ──────────────────────────────────────
async function verifyUser(uid, action) {
    const reason = action === 'reject' ? prompt('Rejection reason:') : null;
    if (action === 'reject' && !reason) return;
    try {
        const r = await fetch(`${serverUrl}/admin/verifications/${uid}`, {
            method: 'PATCH', headers: hdrs(),
            body: JSON.stringify({action, reason: reason||''})
        });
        if (r.ok) { loadVerifications(); loadDrivers(); loadStats(); }
        else { const d = await r.json(); alert('Error: ' + (d.detail||'Unknown')); }
    } catch(e) { alert('Error: ' + e.message); }
}

async function setStatus(uid, status) {
    if (!confirm(`Set user status to "${status}"?`)) return;
    try {
        const r = await fetch(`${serverUrl}/admin/users/${uid}/status`, {
            method: 'PATCH', headers: hdrs(), body: JSON.stringify({status})
        });
        if (r.ok) { loadDrivers(); loadRiders(); loadStats(); }
        else { const d = await r.json(); alert('Error: ' + (d.detail||'Unknown')); }
    } catch(e) { alert('Error: ' + e.message); }
}

async function deleteUser(uid) {
    if (!confirm('Permanently delete this user?')) return;
    try {
        const r = await fetch(`${serverUrl}/admin/users/${uid}`, {method:'DELETE', headers: hdrs()});
        if (r.ok) { loadDrivers(); loadRiders(); loadVerifications(); loadStats(); }
        else { const d = await r.json(); alert('Error: ' + (d.detail||'Unknown')); }
    } catch(e) { alert('Error: ' + e.message); }
}

// ── User chats (inside card) ──────────────────────────
async function viewUserChats(uid, name) {
    const sec = document.getElementById('user-chats-'+uid);
    const inner = document.getElementById('user-chats-inner-'+uid);
    if (!sec.classList.contains('hidden-section')) { sec.classList.add('hidden-section'); return; }
    sec.classList.remove('hidden-section');
    inner.innerHTML = '<div class="loading" style="padding:20px">Loading…</div>';
    try {
        const r = await fetch(`${serverUrl}/admin/users/${uid}/chats`, {headers: hdrs()});
        const chats = await r.json();
        if (!chats.length) { inner.innerHTML = '<div class="pm-box"><p class="pm-empty">No chat history</p></div>'; return; }
        inner.innerHTML = `<div class="hist-section">
            <div class="hist-title">Chat history — ${esc(name)}</div>
            ${chats.map(c=>`<div class="hist-item" onclick="openChatInTab(${c.id})">
                <span class="badge badge-${c.status==='open'?'active':'none'}">${c.status}</span>
                &nbsp;${esc(c.subject||'Support')}
                <span style="color:var(--text3);font-size:11px;float:right">${(c.updated_at||c.created_at||'').slice(0,10)}</span>
                ${c.last_message ? `<br><span style="color:#666;font-size:12px">${esc(c.last_message.slice(0,70))}</span>` : ''}
            </div>`).join('')}
        </div>`;
    } catch(e) { inner.innerHTML = `<div class="err-box">${e.message}</div>`; }
}

// ── User payments (inside card) ───────────────────────

// ── Live Chats ────────────────────────────────────────
let activeChatId = null;
let _msgRefresh = null, _listRefresh = null, _tripsRefresh = null;

function clearAutoRefreshTimers() {
    clearInterval(_msgRefresh); clearInterval(_listRefresh); clearInterval(_tripsRefresh);
    _msgRefresh = _listRefresh = _tripsRefresh = null;
}

function startAutoRefresh() {
    clearAutoRefreshTimers();
    _msgRefresh = setInterval(() => { if (activeChatId) loadChatMessages(activeChatId); }, 10000);
    _listRefresh = setInterval(async () => {
        const prevSize = _knownChatIds.size;
        await loadChats();
        if (_knownChatIds.size > prevSize) _playBeep();
    }, 30000);
    _tripsRefresh = setInterval(() => {
        if (document.getElementById('tab-trips').classList.contains('active')) loadTrips();
    }, 30000);
}

async function loadChats() {
    if (!_msgRefresh) startAutoRefresh();
    const el = document.getElementById('chatsList');
    const showClosed = document.getElementById('showClosed').checked;
    try {
        const r = await fetch(`${serverUrl}/support/chats/all`, {headers: hdrs()});
        if (!r.ok) throw new Error(await r.text());
        let chats = await r.json();
        const newIds = new Set(chats.map(c => c.id));
        if ([...newIds].some(id => !_knownChatIds.has(id) && _knownChatIds.size > 0)) _playBeep();
        _knownChatIds = newIds;
        if (!showClosed) chats = chats.filter(c => c.status === 'open');
        if (!chats.length) { el.innerHTML = '<div class="loading">No chats found</div>'; return; }
        el.innerHTML = chats.map(c => buildChatCard(c)).join('');
        if (activeChatId) loadChatMessages(activeChatId);
    } catch(e) { el.innerHTML = `<div class="err-box">Error: ${e.message}</div>`; }
}

function buildChatCard(c) {
    const isOpen = c.status === 'open';
    return `<div class="chat-card" id="chatcard-${c.id}">
        <div class="chat-header" onclick="toggleChat(${c.id})">
            <div>
                <div class="chat-user">${esc(c.user_name||'Unknown')}
                    ${c.unread_count > 0 ? `<span class="badge-unread">${c.unread_count}</span>` : ''}
                    ${c.needs_escalation ? ' ⚠️' : ''}
                </div>
                <div class="chat-meta">${esc(c.subject||'Support')} &middot; ${(c.updated_at||c.created_at||'').slice(0,16).replace('T',' ')}</div>
            </div>
            <span class="${isOpen ? 'chat-status-open' : 'chat-status-closed'}">${isOpen ? '● OPEN' : '○ CLOSED'}</span>
        </div>
        <div class="chat-body" id="chatbody-${c.id}">
            ${isOpen ? `<div class="chat-actions">
                <button class="btn-close-chat" onclick="closeChat(${c.id})">✕ Close Chat</button>
            </div>` : ''}
            <div class="messages" id="msgs-${c.id}"><div class="loading" style="padding:16px">Click to load…</div></div>
            ${isOpen ? `<div class="reply-row">
                <input class="reply-input" id="reply-${c.id}" placeholder="Type a message…" onkeydown="if(event.key==='Enter')sendMsg(${c.id})">
                <button class="btn-send" onclick="sendMsg(${c.id})">Send</button>
            </div>` : '<p style="color:var(--text3);font-size:12px;margin-top:8px">This chat is closed</p>'}
        </div>
    </div>`;
}

function toggleChat(chatId) {
    const body = document.getElementById('chatbody-'+chatId);
    const opening = !body.classList.contains('open');
    body.classList.toggle('open');
    if (opening) loadChatMessages(chatId);
}

async function loadChatMessages(chatId) {
    activeChatId = chatId;
    const el = document.getElementById('msgs-'+chatId);
    if (!el) return;
    el.innerHTML = '<div class="loading" style="padding:16px">Loading…</div>';
    try {
        const r = await fetch(`${serverUrl}/support/chats/${chatId}/messages/dispatch`, {headers: hdrs()});
        if (!r.ok) throw new Error(await r.text());
        const msgs = await r.json();
        if (!msgs.length) { el.innerHTML = '<p style="color:var(--text3);font-size:13px;text-align:center;padding:12px">No messages</p>'; return; }
        el.innerHTML = msgs.map(m => {
            const cls = m.sender_role==='dispatch' ? 'msg-dispatch' : (m.sender_role==='bot'||m.sender_role==='system') ? 'msg-bot' : 'msg-user';
            return `<div class="msg-bubble ${cls}">
                <div class="msg-sender">${esc(m.sender_name||m.sender_role)}</div>
                <div>${esc(m.message)}</div>
                <div class="msg-time">${(m.created_at||'').slice(0,16).replace('T',' ')}</div>
            </div>`;
        }).join('');
        el.scrollTop = el.scrollHeight;
        const body = document.getElementById('chatbody-'+chatId);
        if (body && !body.classList.contains('open')) body.classList.add('open');
    } catch(e) { if (el) el.innerHTML = `<div class="err-box">${e.message}</div>`; }
}

async function sendMsg(chatId) {
    const input = document.getElementById('reply-'+chatId);
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    try {
        const r = await fetch(`${serverUrl}/support/chats/${chatId}/messages/dispatch`, {
            method:'POST', headers: hdrs(), body: JSON.stringify({message: msg})
        });
        if (r.ok) loadChatMessages(chatId);
        else { const d = await r.json(); alert('Error: '+(d.detail||'Unknown')); }
    } catch(e) { alert('Error: '+e.message); }
}

async function closeChat(chatId) {
    if (!confirm('Close this chat session?')) return;
    try {
        const r = await fetch(`${serverUrl}/support/chats/${chatId}/close`, {method:'PATCH', headers: hdrs()});
        if (r.ok) loadChats();
        else { const d = await r.json(); alert('Error: '+(d.detail||'Unknown')); }
    } catch(e) { alert('Error: '+e.message); }
}

// ── Escape ────────────────────────────────────────────
function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
