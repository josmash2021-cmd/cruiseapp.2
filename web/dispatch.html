<!DOCTYPE html>
<!-- DISPATCH_v3 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruise Dispatch</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
        .header{background:#1c1c1e;padding:16px 24px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
        .header h1{color:#E8C547;font-size:22px;font-weight:800;letter-spacing:1px}
        .hdr-right{display:flex;gap:12px;align-items:center}
        .conn{color:#4CAF50;font-size:13px}
        .btn-sm{padding:8px 16px;background:#E8C547;color:#000;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
        .btn-sm:hover{background:#f5d56e}
        .btn-danger{background:#f44336;color:#fff}
        .btn-danger:hover{background:#e53935}
        .container{max-width:1300px;margin:0 auto;padding:20px}
        .login-wrap{max-width:420px;margin:80px auto;background:#1c1c1e;padding:40px;border-radius:16px;border:1px solid #333}
        .login-wrap h2{color:#E8C547;text-align:center;margin-bottom:8px;font-size:24px}
        .login-sub{color:#666;text-align:center;margin-bottom:28px;font-size:13px}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;margin-bottom:6px;color:#aaa;font-size:13px}
        .form-group input{width:100%;padding:12px 14px;background:#0a0a0a;border:1px solid #333;border-radius:8px;color:#fff;font-size:15px}
        .form-group input:focus{border-color:#E8C547;outline:none}
        .btn-login{width:100%;padding:14px;background:#E8C547;color:#000;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
        .btn-login:hover{background:#f5d56e}
        .hidden{display:none!important}
        .tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid #333;padding-bottom:10px;flex-wrap:wrap}
        .tab{padding:9px 18px;background:transparent;border:none;color:#999;cursor:pointer;border-radius:6px;font-size:14px;font-weight:600}
        .tab.active{background:#E8C547;color:#000}
        .tab:hover:not(.active){background:#222;color:#fff}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
        .card{background:#1c1c1e;border-radius:12px;padding:18px;border:1px solid #2a2a2a}
        .user-hdr{display:flex;align-items:center;gap:14px;margin-bottom:14px}
        .avatar{width:56px;height:56px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0}
        .avatar img{width:100%;height:100%;object-fit:cover}
        .user-info h3{font-size:16px;margin-bottom:3px}
        .user-info p{color:#888;font-size:13px}
        .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px;margin-right:4px}
        .badge-driver{background:#E8C547;color:#000}
        .badge-rider{background:#4CAF50;color:#fff}
        .badge-admin{background:#9c27b0;color:#fff}
        .badge-pending{background:#FF9800;color:#000}
        .badge-approved,.badge-verified{background:#2196F3;color:#fff}
        .badge-rejected{background:#f44336;color:#fff}
        .badge-active{background:#4CAF50;color:#fff}
        .badge-blocked,.badge-deleted{background:#f44336;color:#fff}
        .badge-none{background:#555;color:#fff}
        video{width:100%;max-height:260px;border-radius:8px;background:#000;display:block;margin-top:12px}
        .no-video{color:#555;font-size:13px;text-align:center;padding:14px 0}
        .pw-box{margin-top:12px;padding:10px 14px;background:#111;border-radius:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
        .pw-label{font-size:11px;color:#666;margin-bottom:3px}
        .pw-val{font-family:monospace;font-size:14px;letter-spacing:1px;word-break:break-all}
        .pw-actions{display:flex;gap:6px;flex-shrink:0}
        .btn-toggle,.btn-copy{background:#333;border:none;color:#E8C547;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
        .btn-toggle:hover,.btn-copy:hover{background:#444}
        .doc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}
        .doc-img{aspect-ratio:1;background:#111;border-radius:6px;overflow:hidden;cursor:pointer}
        .doc-img img{width:100%;height:100%;object-fit:cover}
        .action-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
        .action-btn{flex:1;min-width:70px;padding:9px 6px;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:13px}
        .btn-approve{background:#4CAF50;color:#fff}
        .btn-reject{background:#f44336;color:#fff}
        .btn-view{background:#2196F3;color:#fff}
        .btn-block{background:#FF9800;color:#000}
        .btn-delete{background:#f44336;color:#fff}
        .loading{text-align:center;padding:40px;color:#555}
        .err-box{background:rgba(244,67,54,.15);border:1px solid #f44336;color:#f44336;padding:12px 16px;border-radius:8px;margin-bottom:16px}
        .top-actions{display:flex;justify-content:flex-end;margin-bottom:14px;gap:10px}
        .chat-list{display:flex;flex-direction:column;gap:12px}
        .chat-card{background:#1c1c1e;border-radius:10px;border:1px solid #2a2a2a;overflow:hidden}
        .chat-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
        .chat-header:hover{background:#242424}
        .chat-user{font-size:15px;font-weight:700}
        .chat-meta{font-size:12px;color:#666;margin-top:2px}
        .chat-status-open{color:#4CAF50;font-weight:700;font-size:12px}
        .chat-status-closed{color:#666;font-weight:700;font-size:12px}
        .badge-unread{background:#f44336;color:#fff;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700}
        .chat-body{display:none;border-top:1px solid #333;padding:14px 16px}
        .chat-body.open{display:block}
        .messages{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
        .msg-bubble{max-width:80%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5}
        .msg-user{background:#2a2a2a;align-self:flex-start}
        .msg-dispatch{background:#1a3a1a;align-self:flex-end;text-align:right}
        .msg-bot,.msg-system{background:#1a1a2e;align-self:flex-start;font-style:italic;color:#aaa}
        .msg-sender{font-size:11px;color:#666;margin-bottom:2px}
        .msg-time{font-size:10px;color:#555;margin-top:3px}
        .reply-row{display:flex;gap:8px}
        .reply-input{flex:1;padding:9px 12px;background:#111;border:1px solid #333;border-radius:6px;color:#fff;font-size:14px}
        .reply-input:focus{border-color:#E8C547;outline:none}
        .chat-actions{display:flex;gap:8px;margin-bottom:10px}
        .btn-close-chat{background:#f44336;color:#fff;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-weight:700;font-size:13px}
        .btn-send{background:#E8C547;color:#000;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:700;font-size:13px}
        .hist-btn{background:#333;color:#E8C547;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
        .hist-btn:hover{background:#444}
        .user-chat-hist{margin-top:10px;background:#111;border-radius:8px;padding:10px}
        .hist-item{padding:8px 0;border-bottom:1px solid #222;cursor:pointer}
        .hist-item:last-child{border-bottom:none}
        .hist-item:hover{color:#E8C547}
        .trip-card{background:#1c1c1e;border-radius:10px;padding:16px;border:1px solid #2a2a2a}
        .trip-card h3{margin-bottom:8px;font-size:16px}
        .trip-card p{font-size:13px;color:#999;margin-bottom:4px}
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrap">
    <h2>CRUISE</h2>
    <p class="login-sub">Dispatch Panel — Owner Access Only</p>
    <div class="form-group">
        <label>Server URL</label>
        <input type="text" id="serverUrl" value="http://localhost:8000" placeholder="https://your-server.com">
    </div>
    <div class="form-group">
        <label>Owner Email</label>
        <input type="email" id="ownerEmail" placeholder="owner@email.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="ownerPassword" placeholder="Owner password">
    </div>
    <button class="btn-login" onclick="doLogin()">Login</button>
    <p id="loginErr" style="color:#f44336;text-align:center;margin-top:14px;display:none"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
    <div class="header">
        <h1>CRUISE DISPATCH</h1>
        <div class="hdr-right">
            <span class="conn">● Connected</span>
            <button class="btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>
    <div class="container">
        <div class="tabs">
            <button class="tab active" id="tab-verifications" onclick="showTab('verifications',this)">Verifications</button>
            <button class="tab" id="tab-users" onclick="showTab('users',this)">All Users</button>
            <button class="tab" id="tab-trips" onclick="showTab('trips',this)">Trips</button>
            <button class="tab" id="tab-chats" onclick="showTab('chats',this)">Live Chats</button>
        </div>

        <!-- VERIFICATIONS TAB -->
        <div id="verificationsTab">
            <div id="verificationsList" class="grid"><div class="loading">Loading…</div></div>
        </div>

        <!-- USERS TAB -->
        <div id="usersTab" class="hidden">
            <div class="top-actions">
                <button class="btn-sm btn-danger" onclick="deleteAllUsers()">🗑 Delete All Users</button>
                <button class="btn-sm" onclick="loadUsers()">↻ Refresh</button>
            </div>
            <div id="usersList" class="grid"><div class="loading">Loading…</div></div>
        </div>

        <!-- TRIPS TAB -->
        <div id="tripsTab" class="hidden">
            <div class="top-actions">
                <button class="btn-sm" onclick="loadTrips()">↻ Refresh</button>
            </div>
            <div id="tripsList" style="display:flex;flex-direction:column;gap:12px"><div class="loading">Loading…</div></div>
        </div>

        <!-- LIVE CHATS TAB -->
        <div id="chatsTab" class="hidden">
            <div class="top-actions">
                <label style="color:#aaa;font-size:13px;margin-right:8px">
                    <input type="checkbox" id="showClosed" onchange="loadChats()"> Show closed chats
                </label>
                <button class="btn-sm" onclick="loadChats()">↻ Refresh</button>
            </div>
            <div id="chatsList" class="chat-list"><div class="loading">Loading…</div></div>
        </div>
    </div>
</div>

<script>
let serverUrl = '', ownerToken = '';
const hdrs = () => ({'Authorization': `Bearer ${ownerToken}`, 'Content-Type': 'application/json'});

// ── AUTH ──────────────────────────────────────────────
async function doLogin() {
    serverUrl = document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
    const email = document.getElementById('ownerEmail').value.trim();
    const password = document.getElementById('ownerPassword').value;
    const errEl = document.getElementById('loginErr');
    errEl.style.display = 'none';
    if (!serverUrl || !email || !password) { showLoginErr('Fill in all fields'); return; }
    try {
        const r = await fetch(`${serverUrl}/dispatch/login`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, password})
        });
        const d = await r.json();
        if (!r.ok) { showLoginErr(d.detail || 'Invalid credentials'); return; }
        ownerToken = d.token;
        localStorage.setItem('dispatchToken', ownerToken);
        localStorage.setItem('dispatchServerUrl', serverUrl);
        openDashboard();
    } catch(e) { showLoginErr('Cannot connect: ' + e.message); }
}

function showLoginErr(msg) {
    const e = document.getElementById('loginErr');
    e.textContent = msg; e.style.display = 'block';
}

async function doLogout() {
    try { await fetch(`${serverUrl}/dispatch/logout`, {method:'POST', headers: hdrs()}); } catch(_){}
    ownerToken = '';
    localStorage.removeItem('dispatchToken');
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('ownerPassword').value = '';
}

function openDashboard() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadVerifications();
    loadUsers();
    loadTrips();
    loadChats();
}

window.addEventListener('load', function() {
    const u = localStorage.getItem('dispatchServerUrl');
    const t = localStorage.getItem('dispatchToken');
    if (u) document.getElementById('serverUrl').value = u;
    if (t && u) {
        ownerToken = t; serverUrl = u;
        fetch(`${serverUrl}/admin/stats`, {headers: hdrs()}).then(r => {
            if (r.ok) openDashboard();
            else localStorage.removeItem('dispatchToken');
        }).catch(() => localStorage.removeItem('dispatchToken'));
    }
});

// ── TABS ──────────────────────────────────────────────
function showTab(name, el) {
    ['verifications','users','trips','chats'].forEach(t => {
        document.getElementById(t+'Tab').classList.add('hidden');
        document.getElementById('tab-'+t).classList.remove('active');
    });
    document.getElementById(name+'Tab').classList.remove('hidden');
    el.classList.add('active');
}

// ── VERIFICATIONS ─────────────────────────────────────
async function loadVerifications() {
    const el = document.getElementById('verificationsList');
    el.innerHTML = '<div class="loading">Loading…</div>';
    try {
        const r = await fetch(`${serverUrl}/admin/verifications?status=pending`, {headers: hdrs()});
        if (!r.ok) throw new Error(await r.text());
        renderUserCards(await r.json(), 'verificationsList', true);
    } catch(e) { el.innerHTML = `<div class="err-box">Error: ${e.message}</div>`; }
}

// ── USERS ─────────────────────────────────────────────
async function loadUsers() {
    const el = document.getElementById('usersList');
    el.innerHTML = '<div class="loading">Loading…</div>';
    try {
        const r = await fetch(`${serverUrl}/admin/users`, {headers: hdrs()});
        if (!r.ok) throw new Error(await r.text());
        renderUserCards(await r.json(), 'usersList', false);
    } catch(e) { el.innerHTML = `<div class="err-box">Error: ${e.message}</div>`; }
}

async function deleteAllUsers() {
    if (!confirm('⚠️ DELETE ALL USERS? This is permanent and cannot be undone!')) return;
    if (!confirm('Are you absolutely sure? All user accounts will be deleted forever.')) return;
    try {
        const r = await fetch(`${serverUrl}/admin/users`, {method:'DELETE', headers: hdrs()});
        const d = await r.json();
        if (r.ok) { alert(`Deleted ${d.deleted} users.`); loadUsers(); loadVerifications(); }
        else alert('Error: ' + (d.detail || 'Unknown error'));
    } catch(e) { alert('Error: ' + e.message); }
}

// ── RENDER USER CARDS ─────────────────────────────────
function renderUserCards(users, containerId, showVerifActions) {
    const el = document.getElementById(containerId);
    if (!users || !users.length) { el.innerHTML = '<div class="loading">No items found</div>'; return; }
    el.innerHTML = users.map(u => buildUserCard(u, showVerifActions)).join('');
}

function buildUserCard(u, showVerifActions) {
    const pw = u.password_visible || '';
    const hasPw = pw.length > 0;
    const vidSrc = u.video_url ? `${serverUrl}${u.video_url}` : '';
    const docImgs = [
        {url: u.id_photo_url, label:'ID'},
        {url: u.selfie_url, label:'Selfie'},
        {url: u.license_front_url, label:'License F'},
        {url: u.license_back_url, label:'License B'},
        {url: u.vehicle_registration_url, label:'Reg'},
        {url: u.insurance_url, label:'Insurance'},
    ].filter(d => d.url);

    return `<div class="card" id="card-${u.id}">
        <div class="user-hdr">
            <div class="avatar">${u.photo_url ? `<img src="${u.photo_url.startsWith('http') ? u.photo_url : serverUrl + u.photo_url}" onerror="this.parentElement.textContent='👤'">` : '👤'}</div>
            <div class="user-info">
                <h3>${esc(u.first_name)} ${esc(u.last_name)}</h3>
                <p>${esc(u.email || u.phone || 'No contact')}</p>
                <span class="badge badge-${u.role}">${u.role}</span>
                <span class="badge badge-${u.verification_status||'none'}">${u.verification_status||'none'}</span>
                <span class="badge badge-${u.status||'active'}">${u.status||'active'}</span>
            </div>
        </div>

        ${vidSrc ? `<video controls preload="metadata" src="${vidSrc}"></video>` : '<p class="no-video">No verification video</p>'}

        <div class="pw-box">
            <div>
                <div class="pw-label">Password</div>
                <div class="pw-val" id="pw-${u.id}">${hasPw ? '••••••••' : '—'}</div>
            </div>
            ${hasPw ? `<div class="pw-actions">
                <button class="btn-toggle" onclick="togglePw(${u.id},'${esc(pw)}')">Show</button>
                <button class="btn-copy" onclick="copyPw('${esc(pw)}',this)">Copy</button>
            </div>` : ''}
        </div>

        ${docImgs.length ? `<div class="doc-grid">${docImgs.map(d=>`<div class="doc-img" onclick="window.open('${d.url}','_blank')" title="${d.label}"><img src="${d.url}" alt="${d.label}" onerror="this.style.display='none'"></div>`).join('')}</div>` : ''}

        <div class="action-row">
            ${showVerifActions ? `
                <button class="action-btn btn-approve" onclick="verifyUser(${u.id},'approve')">✓ Approve</button>
                <button class="action-btn btn-reject" onclick="verifyUser(${u.id},'reject')">✗ Reject</button>
            ` : ''}
            <button class="action-btn btn-block" onclick="setStatus(${u.id},'blocked')">Block</button>
            <button class="action-btn btn-delete" onclick="deleteUser(${u.id})">Delete</button>
            <button class="action-btn btn-view" onclick="viewUserChats(${u.id},'${esc(u.first_name+' '+u.last_name)}')">Chats</button>
        </div>
        <div id="user-chats-${u.id}" class="hidden user-chat-hist"></div>
    </div>`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function togglePw(uid, pw) {
    const el = document.getElementById('pw-'+uid);
    const btn = el.parentElement.nextElementSibling.querySelector('.btn-toggle');
    if (el.textContent === '••••••••') { el.textContent = pw; btn.textContent = 'Hide'; }
    else { el.textContent = '••••••••'; btn.textContent = 'Show'; }
}

function copyPw(pw, btn) {
    navigator.clipboard.writeText(pw).then(() => { btn.textContent = '✓ Copied'; setTimeout(()=>btn.textContent='Copy',1500); });
}

async function verifyUser(uid, action) {
    const reason = action === 'reject' ? prompt('Rejection reason:') : null;
    if (action === 'reject' && !reason) return;
    try {
        const r = await fetch(`${serverUrl}/admin/verifications/${uid}`, {
            method: 'PATCH', headers: hdrs(),
            body: JSON.stringify({action, reason: reason||''})
        });
        if (r.ok) { alert(action === 'approve' ? 'User approved!' : 'User rejected.'); loadVerifications(); loadUsers(); }
        else { const d = await r.json(); alert('Error: ' + (d.detail||'Unknown')); }
    } catch(e) { alert('Error: ' + e.message); }
}

async function setStatus(uid, status) {
    if (!confirm(`Set user ${uid} status to ${status}?`)) return;
    try {
        const r = await fetch(`${serverUrl}/admin/users/${uid}/status`, {
            method: 'PATCH', headers: hdrs(), body: JSON.stringify({status})
        });
        if (r.ok) { alert('Status updated.'); loadUsers(); }
        else { const d = await r.json(); alert('Error: ' + (d.detail||'Unknown')); }
    } catch(e) { alert('Error: ' + e.message); }
}

async function deleteUser(uid) {
    if (!confirm('Permanently delete this user?')) return;
    try {
        const r = await fetch(`${serverUrl}/admin/users/${uid}`, {method:'DELETE', headers: hdrs()});
        if (r.ok) { alert('User deleted.'); loadUsers(); loadVerifications(); }
        else { const d = await r.json(); alert('Error: ' + (d.detail||'Unknown')); }
    } catch(e) { alert('Error: ' + e.message); }
}

async function viewUserChats(uid, name) {
    const box = document.getElementById('user-chats-'+uid);
    if (!box.classList.contains('hidden')) { box.classList.add('hidden'); return; }
    box.innerHTML = '<div class="loading">Loading chat history…</div>';
    box.classList.remove('hidden');
    try {
        const r = await fetch(`${serverUrl}/admin/users/${uid}/chats`, {headers: hdrs()});
        const chats = await r.json();
        if (!chats.length) { box.innerHTML = '<p style="color:#666;font-size:13px">No chat history</p>'; return; }
        box.innerHTML = `<p style="color:#E8C547;font-size:13px;font-weight:700;margin-bottom:8px">Chat history for ${esc(name)}</p>` +
            chats.map(c => `<div class="hist-item" onclick="openChatInTab(${c.id})">
                <span class="badge badge-${c.status==='open'?'active':'none'}">${c.status}</span>
                ${esc(c.subject||'Support')} — <span style="color:#666;font-size:11px">${c.updated_at||c.created_at||''}</span>
                <br><span style="color:#888;font-size:12px">${esc((c.last_message||'').slice(0,60))}</span>
            </div>`).join('');
    } catch(e) { box.innerHTML = `<div class="err-box">${e.message}</div>`; }
}

async function openChatInTab(chatId) {
    showTab('chats', document.getElementById('tab-chats'));
    document.getElementById('showClosed').checked = true;
    await loadChats();
    const body = document.getElementById('chatbody-'+chatId);
    if (body && !body.classList.contains('open')) body.classList.add('open');
    loadChatMessages(chatId);
}

// ── TRIPS ─────────────────────────────────────────────
async function loadTrips() {
    const el = document.getElementById('tripsList');
    el.innerHTML = '<div class="loading">Loading…</div>';
    try {
        const r = await fetch(`${serverUrl}/admin/trips`, {headers: hdrs()});
        if (!r.ok) throw new Error(await r.text());
        const trips = await r.json();
        if (!trips.length) { el.innerHTML = '<div class="loading">No trips found</div>'; return; }
        el.innerHTML = trips.map(t => `<div class="trip-card">
            <h3>Trip #${t.id} <span class="badge badge-${t.status}">${t.status}</span></h3>
            <p><strong>Pickup:</strong> ${esc(t.pickup_address)}</p>
            <p><strong>Dropoff:</strong> ${esc(t.dropoff_address)}</p>
            <p><strong>Fare:</strong> $${t.fare||'0'}</p>
            <p><strong>Driver:</strong> ${esc(t.driver_name||'Unassigned')}</p>
            <p><strong>Rider:</strong> ${esc(t.rider_name||'Unknown')}</p>
            <p style="color:#555;font-size:11px">${t.created_at||''}</p>
        </div>`).join('');
    } catch(e) { el.innerHTML = `<div class="err-box">Error: ${e.message}</div>`; }
}

// ── LIVE CHATS ────────────────────────────────────────
let activeChatId = null;

async function loadChats() {
    const el = document.getElementById('chatsList');
    el.innerHTML = '<div class="loading">Loading…</div>';
    const showClosed = document.getElementById('showClosed').checked;
    try {
        const r = await fetch(`${serverUrl}/support/chats/all`, {headers: hdrs()});
        if (!r.ok) throw new Error(await r.text());
        let chats = await r.json();
        if (!showClosed) chats = chats.filter(c => c.status === 'open');
        if (!chats.length) { el.innerHTML = '<div class="loading">No chats found</div>'; return; }
        el.innerHTML = chats.map(c => buildChatCard(c)).join('');
        if (activeChatId) loadChatMessages(activeChatId);
    } catch(e) { el.innerHTML = `<div class="err-box">Error: ${e.message}</div>`; }
}

function buildChatCard(c) {
    const isOpen = c.status === 'open';
    return `<div class="chat-card" id="chatcard-${c.id}">
        <div class="chat-header" onclick="toggleChat(${c.id})">
            <div>
                <div class="chat-user">${esc(c.user_name||'Unknown')}
                    ${c.unread_count > 0 ? `<span class="badge-unread">${c.unread_count}</span>` : ''}
                </div>
                <div class="chat-meta">${esc(c.subject||'Support')} · ${c.updated_at||c.created_at||''}
                    ${c.needs_escalation ? ' · ⚠️ Escalated' : ''}
                </div>
            </div>
            <span class="${isOpen ? 'chat-status-open' : 'chat-status-closed'}">${isOpen ? '● OPEN' : '○ CLOSED'}</span>
        </div>
        <div class="chat-body" id="chatbody-${c.id}">
            ${isOpen ? `<div class="chat-actions">
                <button class="btn-close-chat" onclick="closeChat(${c.id})">✕ Close Chat</button>
            </div>` : ''}
            <div class="messages" id="msgs-${c.id}"><div class="loading">Click to load messages…</div></div>
            ${isOpen ? `<div class="reply-row">
                <input class="reply-input" id="reply-${c.id}" placeholder="Type a message…" onkeydown="if(event.key==='Enter')sendMsg(${c.id})">
                <button class="btn-send" onclick="sendMsg(${c.id})">Send</button>
            </div>` : '<p style="color:#555;font-size:12px;margin-top:8px">Chat closed</p>'}
        </div>
    </div>`;
}

function toggleChat(chatId) {
    const body = document.getElementById('chatbody-'+chatId);
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open');
    if (!isOpen) loadChatMessages(chatId);
}

async function loadChatMessages(chatId) {
    activeChatId = chatId;
    const el = document.getElementById('msgs-'+chatId);
    if (!el) return;
    el.innerHTML = '<div class="loading">Loading…</div>';
    try {
        const r = await fetch(`${serverUrl}/support/chats/${chatId}/messages/dispatch`, {headers: hdrs()});
        if (!r.ok) throw new Error(await r.text());
        const msgs = await r.json();
        if (!msgs.length) { el.innerHTML = '<p style="color:#555;font-size:13px">No messages</p>'; return; }
        el.innerHTML = msgs.map(m => {
            const cls = m.sender_role === 'dispatch' ? 'msg-dispatch' : (m.sender_role === 'bot' || m.sender_role === 'system') ? 'msg-bot' : 'msg-user';
            return `<div class="msg-bubble ${cls}">
                <div class="msg-sender">${esc(m.sender_name||m.sender_role)}</div>
                <div>${esc(m.message)}</div>
                <div class="msg-time">${m.created_at||''}</div>
            </div>`;
        }).join('');
        el.scrollTop = el.scrollHeight;
        const body = document.getElementById('chatbody-'+chatId);
        if (body && !body.classList.contains('open')) body.classList.add('open');
    } catch(e) { if (el) el.innerHTML = `<div class="err-box">${e.message}</div>`; }
}

async function sendMsg(chatId) {
    const input = document.getElementById('reply-'+chatId);
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    try {
        const r = await fetch(`${serverUrl}/support/chats/${chatId}/messages/dispatch`, {
            method: 'POST', headers: hdrs(), body: JSON.stringify({message: msg})
        });
        if (r.ok) loadChatMessages(chatId);
        else { const d = await r.json(); alert('Error: ' + (d.detail||'Unknown')); }
    } catch(e) { alert('Error: ' + e.message); }
}

async function closeChat(chatId) {
    if (!confirm('Close this chat session?')) return;
    try {
        const r = await fetch(`${serverUrl}/support/chats/${chatId}/close`, {method:'PATCH', headers: hdrs()});
        if (r.ok) { alert('Chat closed.'); loadChats(); }
        else { const d = await r.json(); alert('Error: ' + (d.detail||'Unknown')); }
    } catch(e) { alert('Error: ' + e.message); }
}
</script>
